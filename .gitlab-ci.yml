stages:
  - version
  - security
  - build

variables:
  GIT_STRATEGY: fetch

create_git_tag:
  stage: version
  image: public.ecr.aws/docker/library/node:22.21.1-alpine3.21
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $GITLAB_USER_NAME != "GitLab CI"'
      changes:
        - package.json
      when: on_success
    - when: never
  script:
    # Install git and jq for version comparison
    - apk add --no-cache git jq

    - echo "Checking if package.json version was bumped..."
    - 'PREVIOUS_VERSION=$(git show HEAD~1:package.json | jq -r ".version")'
    - CURRENT_VERSION=$(jq -r '.version' package.json)

    - 'echo "Previous version: $PREVIOUS_VERSION"'
    - 'echo "Current version: $CURRENT_VERSION"'

    - |
      if [ "$PREVIOUS_VERSION" = "$CURRENT_VERSION" ]; then
        echo "Version was not changed — skipping."
        exit 0
      else
        echo "Version changed to $CURRENT_VERSION, continuing."
      fi

    - git config --global user.email "git@sralton.ch"
    - git config --global user.name "GitLab CI"
    - git remote add gitlab_origin https://oauth2:${GITLAB_ACCESS_TOKEN}@gitlab.fhnw.ch/spd/module/devops/hs25/hs25-group28/service-jundt.git


    - npm install
    - npm run version

    - git add package-lock.json CHANGELOG.md || true
    - 'git commit -m "chore(release): release version $CURRENT_VERSION"'

    - |
      if git rev-parse "$CURRENT_VERSION" >/dev/null 2>&1; then
        git tag -d "$CURRENT_VERSION"
      fi

    - git tag -a "$CURRENT_VERSION" -m "Release $CURRENT_VERSION"
    - git push origin HEAD:$CI_COMMIT_REF_NAME
    - git push origin "$CURRENT_VERSION"

build_docker_image:
  # docker in docker -> build image and push to gitlab repository
  stage: build
  image: public.ecr.aws/docker/library/docker:28.5.1
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  services:
    - name: public.ecr.aws/docker/library/docker:28.5.1-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_DRIVER: overlay2
    DOCKER_IMAGE: cr.gitlab.fhnw.ch/spd/module/devops/hs25/hs25-group28/service-jundt
  script:
    - apk add --no-cache git
    - git fetch --all
    - git pull origin main
    - |
      if git describe --exact-match "$(git rev-parse origin/main)" >/dev/null 2>&1; then
        echo "Tag found for commit $COMMIT_HASH"
      else
        echo "No tag found for commit $COMMIT_HASH, skipping Docker build."
        exit 0
      fi

    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" https://$CI_REGISTRY
    - IMAGE_TAG=$(git describe --exact-match "$(git rev-parse origin/main)")
    - echo "IMAGE_TAG=$IMAGE_TAG" > build.env
    - echo "IMAGE_TAG=$IMAGE_TAG"
    - cp .env.example .env
    - docker build -t $DOCKER_IMAGE:$IMAGE_TAG .
    - docker tag $DOCKER_IMAGE:$IMAGE_TAG $DOCKER_IMAGE:latest
    - echo "Pushing Docker image $DOCKER_IMAGE:$IMAGE_TAG to registry..."
    - docker push $DOCKER_IMAGE:$IMAGE_TAG
    - docker push $DOCKER_IMAGE:latest
  artifacts:
    paths:
      - build.env
    expire_in: 1 hour

cve_scan:
  stage: security
  image: public.ecr.aws/docker/library/docker:28.5.1
  services:
    - name: public.ecr.aws/docker/library/docker:28.5.1-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_IMAGE: cr.gitlab.fhnw.ch/spd/module/devops/hs25/hs25-group28/service-jundt
  before_script:
    - apk add --no-cache curl
    - curl -sSfL https://get.anchore.io/grype | sh -s -- -b /usr/local/bin
  script:
    - echo "Building Docker image..."
    - cp .env.example .env
    - docker build -t $DOCKER_IMAGE:dev .
    - echo "Running Grype scan..."
    - OUTPUT=$(grype $DOCKER_IMAGE:dev --only-fixed)
    - echo "Grype Report -> $OUTPUT"
    - echo "$OUTPUT" > grype-report.txt
  artifacts:
    paths:
      - grype-report.txt
    expire_in: 1 week

